# Mosquitto broker configuration for the mqtt-broker Docker Compose
# service (deployments/compose/mqtt-broker.yml). Every RAM-USB service
# that publishes metrics (EH-F-10, SS-F-07, DV-F-16, ST-F-12, NM-F-17,
# CA-F-03) and Metrics-Collector (MT-F-01, MT-F-02) connect here over
# mTLS - no other client is expected to reach this broker.
#
# NET-F-01: this listener is reachable only over the private network - no
# port is published to the host beyond deployments/compose/mqtt-broker.yml's
# own dev-only convenience mapping (see that file for the exact port).
#
# PKI-F-01/PKI-F-02/NET-F-02: mutual X.509 authentication over TLS 1.3,
# with the client certificate's Subject CN (== Subject.Organization for
# every RAM-USB identity, see third-party/certificate-authority/config/
# organization.x509.tpl's doc comment) used as the ACL username - see
# acl.conf's own doc comment for the full ACL model.
listener 8883
protocol mqtt

cafile /mosquitto/certs/mqtt-dev-ca.dev-only.crt
certfile /mosquitto/certs/broker.dev-only.crt
keyfile /mosquitto/certs/broker.dev-only.key

# require_certificate + use_identity_as_username together are what let
# acl_file's "user <CN>" lines authenticate a client by certificate alone,
# with no separate MQTT username/password exchanged at all.
require_certificate true
use_identity_as_username true
tls_version tlsv1.3

# allow_anonymous false: fail-secure (RD-04) - without this, a client that
# doesn't present a valid certificate would still be accepted as an
# anonymous, ACL-less (i.e. denied by acl_file's own default-deny, but
# only after connecting) client rather than being rejected at the TLS
# handshake/CONNECT level.
allow_anonymous false

acl_file /mosquitto/config/acl.conf

persistence false
log_dest stdout
