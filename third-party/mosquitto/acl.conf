# Mosquitto access-control list, referenced by mosquitto.conf's acl_file
# directive (the SRS's MT-F-02 note literally links to
# "mqtt-broker/acl.conf" - this is that file's real, established location
# in this project's third-party/<component>/ layout, e.g.
# third-party/network-manager/, third-party/certificate-authority/).
#
# acl_file is DEFAULT-DENY: per mosquitto.org's mosquitto-conf(5) man page
# and the ACL-file plugin doc page (identical wording on both, verified
# this session), "If this parameter is defined then only the topics
# listed will have access." A client with no matching "user" block below
# gets zero topic access; a listed client's non-listed topics are
# implicitly denied too. No catch-all "pattern deny #" is needed or added.
#
# mosquitto.conf sets "use_identity_as_username true", so the "user" name
# below is each client certificate's Subject CN - not an MQTT username/
# password. Every RAM-USB service already has an established mTLS
# identity string, the non-hyphenated Subject.Organization value its
# bootstrapped or dev-only certificate carries (see
# third-party/certificate-authority/config/organization.x509.tpl's own
# doc comment for the full list: EntryHub, SecuritySwitch, DatabaseVault,
# StorageService, NetworkManager, CertificateAuthority) - reused here
# verbatim as the MQTT ACL username, rather than minting a second,
# differently-named identity per service just for MQTT (confirmed with
# the user this session). The topic each service writes to is the
# hyphenated SRS-literal form (pkg/metrics.TopicFor's "metrics/" +
# serviceName), which differs from the username on purpose - the ACL
# below simply maps one to the other explicitly, one block per publishing
# service.

user EntryHub
topic write metrics/Entry-Hub

user SecuritySwitch
topic write metrics/Security-Switch

user DatabaseVault
topic write metrics/Database-Vault

user StorageService
topic write metrics/Storage-Service

user NetworkManager
topic write metrics/Network-Manager

# Certificate-Authority also publishes metrics (CA-F-03) even though it is
# the smallstep/step-ca third-party image, not RAM-USB Go code - this ACL
# grant exists independently of whether/when that publish side is wired,
# so it's ready the moment it is.
user CertificateAuthority
topic write metrics/Certificate-Authority

# Metrics-Collector (MT-F-01): the one client allowed to read every
# metrics topic, and only metrics topics. It never writes to any topic -
# no "topic write" line exists for this user.
user MetricsCollector
topic read metrics/#
