# Development Docker Compose stack (docs/Test_Plan.md §4: integration and
# system tests run against this stack).
#
# Database-Vault's Postgres datastore, Network-Manager's Headscale backend,
# and the Certificate-Authority (official smallstep/step-ca image,
# CA-F-01..CA-F-04, PKI-F-01/02) are defined so far. Every other service
# listed in deployments/docker/ still has an empty Dockerfile and no
# main.go yet; add its compose entry in the task that gives it a working
# binary, rather than stubbing one out here ahead of time.
services:
  database-vault-postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: database_vault
      POSTGRES_PASSWORD: database_vault_dev_only
      POSTGRES_DB: database_vault
    ports:
      - "5432:5432"
    volumes:
      - database-vault-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U database_vault -d database_vault"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Network-Manager's mesh-coordination backend (NM-F-08, NM-F-09): a
  # self-hosted Tailscale control plane (SRS 2.4's "Headscale mesh VPN").
  # Config, TLS cert/key rationale, and every judgment call made this
  # session are documented in
  # third-party/network-manager/headscale/config/config.yaml's own doc
  # comment - read that file before changing anything here.
  network-manager-headscale:
    image: headscale/headscale:0.29
    command: serve
    volumes:
      - network-manager-headscale-data:/var/lib/headscale
      - ../third-party/network-manager/headscale/config:/etc/headscale:ro
      # Mounted at a path NOT nested under /etc/headscale itself: this
      # image's /etc is read-only at the filesystem level beyond the
      # config bind mount's own mountpoint, so a second bind mount nested
      # under /etc/headscale/tls fails with "read-only file system"
      # trying to create that mountpoint (found by actually running the
      # container this session, the same category of gotcha already
      # documented for smallstep/step-ca's /home/step/secrets in
      # code-agent memory).
      - ../third-party/network-manager/headscale/dev-tls:/etc/headscale-tls:ro
    ports:
      - "50443:50443"
    healthcheck:
      # This image (ko-built, no shell/wget/curl - confirmed by actually
      # running it this session) only exposes the headscale binary
      # itself; its own "headscale health" subcommand is the practical
      # healthcheck, not an HTTP probe.
      test: ["CMD", "/ko-app/headscale", "health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Official smallstep/step-ca image (docs/design/diagrams/08-security-pki-hierarchy.puml:
  # a single self-signed private CA issuing certs to every service). On first
  # boot, the DOCKER_STEPCA_INIT_* variables run `step ca init` non-interactively,
  # bootstrapping a brand-new root+intermediate CA plus a default JWK
  # provisioner (CA-F-04's bootstrap-token mechanism) with no extra config
  # needed. Config/keys/the CA's own database persist under /home/step across
  # restarts via the named volume below.
  #
  # certificate_authority_dev_only (third-party/certificate-authority/config/
  # password.dev-only.txt) is a throwaway placeholder for the intermediate
  # key's password, same dev-only convention as database-vault-postgres's
  # POSTGRES_PASSWORD above — never a production secret.
  certificate-authority:
    image: smallstep/step-ca:latest
    environment:
      DOCKER_STEPCA_INIT_NAME: "RAM-USB Dev CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,certificate-authority"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/ca-password.dev-only
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
    ports:
      - "9000:9000"
    volumes:
      - certificate-authority-data:/home/step
      - ../third-party/certificate-authority/config/password.dev-only.txt:/run/secrets/ca-password.dev-only:ro
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url", "https://localhost:9000", "--root", "/home/step/certs/root_ca.crt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  database-vault-postgres-data:
  network-manager-headscale-data:
  certificate-authority-data:
